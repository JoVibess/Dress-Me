<VirtualHost *:80>
    ServerName dressme.joeydecroix.com

    DocumentRoot /var/www/public
    DirectoryIndex index.php

    <Directory /var/www/public>
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/dressme_error.log
    CustomLog ${APACHE_LOG_DIR}/dressme_access.log combined
</VirtualHost>
